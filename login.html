<!-- TopAppBar -->
<div id="header-container"></div>
<!-- Subtle Background Elements -->
<div class="fixed inset-0 bg-pattern -z-10"></div>
<main class="flex-grow flex items-center justify-center p-margin-mobile md:p-margin-desktop">
<div class="w-full max-w-[440px] transition-all duration-500 ease-out transform translate-y-0 opacity-100">
<!-- Brand Header -->
<div class="flex flex-col items-center mb-lg">
<img alt="CiccioSheets Logo" class="w-20 h-20 mb-base hover:scale-105 transition-transform duration-300" src="favicon.svg"/>
<h1 class="font-headline-lg text-headline-lg text-primary tracking-tight">CiccioSheets</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-xs">Gestisci i tuoi turni con cura</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-xl p-md md:p-lg login-card-shadow border border-outline-variant/30">
<form class="space-y-md" id="loginForm">
<!-- Email Field -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface-variant ml-xs" for="email">Email</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline group-focus-within:text-secondary transition-colors">mail</span>
<input class="w-full bg-surface-container-low border-transparent border-b-2 border-b-outline-variant/50 focus:border-b-secondary focus:ring-0 rounded-lg py-sm pl-[52px] pr-md text-on-surface placeholder:text-outline/60 transition-all duration-200 outline-none" id="email" placeholder="nome@azienda.it" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-xs">
<div class="flex justify-between items-center px-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="password">Password</label>
<a class="font-label-sm text-label-sm text-secondary hover:text-primary transition-colors hover:underline" href="javascript:void(0)">Password dimenticata?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline group-focus-within:text-secondary transition-colors">lock</span>
<input class="w-full bg-surface-container-low border-transparent border-b-2 border-b-outline-variant/50 focus:border-b-secondary focus:ring-0 rounded-lg py-sm pl-[52px] pr-[52px] text-on-surface placeholder:text-outline/60 transition-all duration-200 outline-none" id="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-md top-1/2 -translate-y-1/2 text-outline hover:text-secondary transition-colors" id="togglePassword" type="button">
<span class="material-symbols-outlined" id="pwIcon">visibility</span>
</button>
</div>
</div>

<button class="w-full bg-primary text-on-primary font-label-md text-label-md py-sm rounded-lg hover:bg-tertiary active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-base mt-md" type="submit">
                        Accedi
                        <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>

</main>
<script>
        // Password Visibility Toggle
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        const pwIcon = document.getElementById('pwIcon');

        togglePassword.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            pwIcon.textContent = type === 'password' ? 'visibility' : 'visibility_off';
        });


        // Soft entry animation for cards
        document.addEventListener('DOMContentLoaded', () => {
            const card = document.querySelector('.login-card-shadow');
            card.style.opacity = '0';
            card.style.transform = 'translateY(10px)';

            setTimeout(() => {
                card.style.transition = 'all 0.6s cubic-bezier(0.22, 1, 0.36, 1)';
                card.style.opacity = '1';
                card.style.transform = 'translateY(0)';
            }, 100);
        });
    </script>
