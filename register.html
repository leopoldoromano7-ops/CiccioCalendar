<!DOCTYPE html>
<html class="light" lang="it">
<head>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Registrati - CiccioSheets</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#282625",
                        "secondary": "#6b5c4c",
                        "background": "#fff8f5",
                        "surface": "#fff8f5",
                        "on-surface": "#201b15",
                        "outline-variant": "#ccc5bd",
                        "surface-container-low": "#fef1e9",
                        "surface-container-lowest": "#ffffff"
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-surface font-sans min-h-screen flex flex-col">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/init-supabase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/auth-ui.js"></script>
    <script src="js/auth-forms.js"></script>

    <!-- TopAppBar -->
    <header class="w-full top-0 sticky z-50 bg-surface h-20 shadow-none">
        <div class="flex justify-between items-center max-w-7xl mx-auto px-margin-desktop h-full">
            <a href="index.html" class="flex items-center gap-sm">
                <img alt="CiccioSheets Logo" class="w-10 h-10 object-contain" src="favicon.svg">
                <span class="font-headline-md text-headline-md font-bold text-primary">CiccioSheets</span>
            </a>
            <nav class="hidden md:flex items-center gap-lg">
                <a class="font-body-md text-body-md text-primary hover:text-secondary transition-colors" href="index.html">CALENDAR</a>
                <a class="font-body-md text-body-md text-primary hover:text-secondary transition-colors" href="report.html">REPORT</a>
                <a class="font-body-md text-body-md text-primary hover:text-secondary transition-colors" href="timbratura.html">TIMBRA</a>
            </nav>
            <div class="flex items-center gap-md" id="auth-buttons">
                <a href="login.html" class="hidden md:block font-body-md text-body-md text-primary hover:underline transition-all">Log In</a>
                <a href="register.html" class="bg-primary text-on-primary px-xl py-sm rounded-lg font-label-md text-label-md hover:opacity-90 active:scale-95 duration-200">
                    Get Started
                </a>
            </div>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center p-6">
        <div class="w-full max-w-[440px] bg-surface-container-lowest rounded-xl p-8 shadow-xl border border-outline-variant/30">
            <div class="flex flex-col items-center mb-8">
                <h1 class="text-3xl font-bold text-primary">Crea Account</h1>
                <p class="text-on-surface-variant mt-2">Unisciti alla famiglia di CiccioSheets</p>
            </div>
            <form class="space-y-4" id="registerForm">
                <div>
                    <label class="block text-sm font-medium mb-1" for="fullName">Nome Completo</label>
                    <input class="w-full rounded-lg border-outline-variant bg-surface-container-low" id="fullName" placeholder="Mario Rossi" required type="text">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1" for="email">Email</label>
                    <input class="w-full rounded-lg border-outline-variant bg-surface-container-low" id="email" placeholder="mario@esempio.it" required type="email">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1" for="password">Password</label>
                    <input class="w-full rounded-lg border-outline-variant bg-surface-container-low" id="password" placeholder="••••••••" required type="password">
                </div>
                <button class="w-full bg-primary text-white py-3 rounded-lg font-bold hover:bg-black transition-colors mt-4" type="submit">
                    Registrati
                </button>
            </form>
            <div class="mt-6 text-center">
                <p class="text-sm">Hai già un account? <a href="login.html" class="text-secondary font-bold hover:underline">Accedi</a></p>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="w-full py-xl bg-surface-container-low border-t border-outline-variant">
        <div class="flex flex-col md:flex-row justify-between items-center max-w-7xl mx-auto px-margin-desktop gap-md">
            <div class="flex flex-col items-center md:items-start gap-xs">
                <div class="flex items-center gap-xs mb-xs">
                    <img alt="CiccioSheets Logo" class="w-8 h-8 opacity-70" src="favicon.svg">
                    <span class="font-headline-md text-headline-md font-bold text-primary">CiccioSheets</span>
                </div>
                <p class="font-label-md text-label-md text-secondary max-w-[300px] text-center md:text-left">© 2024 CiccioSheets. All rights reserved. Built for modern teams.</p>
            </div>
            <div class="flex flex-wrap justify-center gap-md">
                <a class="font-label-md text-label-md text-secondary hover:text-primary underline transition-all" href="#">Privacy Policy</a>
                <a class="font-label-md text-label-md text-secondary hover:text-primary underline transition-all" href="#">Terms of Service</a>
                <a class="font-label-md text-label-md text-secondary hover:text-primary underline transition-all" href="#">Cookie Policy</a>
                <a class="font-label-md text-label-md text-secondary hover:text-primary underline transition-all" href="#">Support</a>
                <a class="font-label-md text-label-md text-secondary hover:text-primary underline transition-all" href="#">Contact</a>
            </div>
        </div>
    </footer>
</body>
</html>
