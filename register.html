<body class="bg-background text-on-surface font-sans min-h-screen flex flex-col">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/init-supabase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/header.js"></script>
    <script src="js/footer.js"></script>
    <script src="js/auth-forms.js"></script>

    <!-- TopAppBar -->
    <div id="header-container"></div>

    <main class="flex-grow flex items-center justify-center p-6">
        <div class="w-full max-w-[440px] bg-surface-container-lowest rounded-xl p-8 shadow-xl border border-outline-variant/30">
            <div class="flex flex-col items-center mb-8">
                <h1 class="text-3xl font-bold text-primary">Crea Account</h1>
                <p class="text-on-surface-variant mt-2">Unisciti alla famiglia di CiccioSheets</p>
            </div>
            <form class="space-y-4" id="registerForm">
                <div>
                    <label class="block text-sm font-medium mb-1" for="fullName">Nome Completo</label>
                    <input class="w-full rounded-lg border-outline-variant bg-surface-container-low" id="fullName" placeholder="Mario Rossi" required type="text">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1" for="email">Email</label>
                    <input class="w-full rounded-lg border-outline-variant bg-surface-container-low" id="email" placeholder="mario@esempio.it" required type="email">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1" for="password">Password</label>
                    <input class="w-full rounded-lg border-outline-variant bg-surface-container-low" id="password" placeholder="••••••••" required type="password">
                </div>
                <button class="w-full bg-primary text-white py-3 rounded-lg font-bold hover:bg-black transition-colors mt-4" type="submit">
                    Registrati
                </button>
            </form>
            <div class="mt-6 text-center">
                <p class="text-sm">Hai già un account? <a href="login.html" class="text-secondary font-bold hover:underline">Accedi</a></p>
            </div>
        </div>
    </main>

    <div id="footer-container"></div>
</body>
</html>
