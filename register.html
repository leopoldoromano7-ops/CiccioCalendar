<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - ShiftGuardian</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Hanken Grotesk', sans-serif; background-color: #fff8f5; }
    </style>
</head>
<body class="text-[#201b15] min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-white rounded-3xl p-8 shadow-xl border border-[#ece0d8]">
        <div class="flex flex-col items-center mb-8">
            <a href="landingpage.html" class="flex items-center gap-2 mb-4">
                <img src="favicon.svg" alt="Logo" class="h-10 w-10">
                <span class="text-2xl font-bold text-[#282625]">ShiftGuardian</span>
            </a>
            <h1 class="text-3xl font-bold text-[#282625]">Create an account</h1>
            <p class="text-[#4a4640]">Join us and start managing your shifts.</p>
        </div>

        <form id="registerForm" class="space-y-4">
            <div>
                <label class="block text-sm font-bold text-[#4a4640] mb-1">Email</label>
                <input type="email" id="email" required class="w-full p-3 rounded-xl border border-[#ccc5bd] focus:border-[#282625] outline-none transition-all">
            </div>
            <div>
                <label class="block text-sm font-bold text-[#4a4640] mb-1">Password</label>
                <input type="password" id="password" required minlength="6" class="w-full p-3 rounded-xl border border-[#ccc5bd] focus:border-[#282625] outline-none transition-all">
            </div>
            <button type="submit" class="w-full bg-[#282625] text-white py-3 rounded-xl font-bold hover:shadow-lg active:scale-95 transition-all mt-4">Sign Up</button>
        </form>

        <p id="message" class="mt-4 text-center text-sm"></p>

        <div class="mt-8 pt-6 border-t border-[#f8ece3] text-center">
            <p class="text-[#4a4640]">Already have an account? <a href="login.html" class="text-[#282625] font-bold hover:underline">Log In</a></p>
        </div>
    </div>

    <script src="supabase-config.js"></script>
    <script>
        const registerForm = document.getElementById('registerForm');
        const messageEl = document.getElementById('message');

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            messageEl.textContent = 'Signing up...';
            messageEl.className = 'mt-4 text-center text-sm text-blue-500';

            const { data, error } = await _supabase.auth.signUp({
                email,
                password,
            });

            if (error) {
                messageEl.textContent = error.message;
                messageEl.className = 'mt-4 text-center text-sm text-red-500';
            } else {
                messageEl.textContent = 'Registration successful! Please check your email for confirmation.';
                messageEl.className = 'mt-4 text-center text-sm text-green-500';
                // Optionally redirect
                // window.location.href = 'login.html';
            }
        });
    </script>
</body>
</html>
