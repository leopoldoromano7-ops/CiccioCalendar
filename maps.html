<!DOCTYPE html>
<html class="light" lang="it">
<head>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Percorso Passeggiata | CiccioSheets</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Hanken+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "outline": "#7c766f",
                    "secondary": "#6b5c4c",
                    "primary": "#282625",
                    "on-background": "#201b15",
                    "surface-container-high": "#f2e6dd",
                    "on-secondary-fixed-variant": "#524436",
                    "inverse-surface": "#362f2a",
                    "on-secondary-container": "#716252",
                    "error-container": "#ffdad6",
                    "on-primary-fixed-variant": "#494644",
                    "surface-dim": "#e4d8cf",
                    "surface-container-low": "#fef1e9",
                    "surface-variant": "#ece0d8",
                    "on-surface": "#201b15",
                    "on-primary-container": "#aaa6a3",
                    "inverse-primary": "#cac6c3",
                    "on-secondary-fixed": "#241a0e",
                    "secondary-container": "#f4dfcb",
                    "on-primary": "#ffffff",
                    "secondary-fixed": "#f4dfcb",
                    "background": "#fff8f5",
                    "on-tertiary-fixed-variant": "#4c463f",
                    "primary-container": "#3e3c3a",
                    "surface-container-highest": "#ece0d8",
                    "secondary-fixed-dim": "#d7c3b0",
                    "surface": "#fff8f5",
                    "on-error-container": "#93000a",
                    "outline-variant": "#ccc5bd",
                    "inverse-on-surface": "#fbeee6",
                    "tertiary-fixed-dim": "#cec5bc",
                    "tertiary-fixed": "#ebe1d8",
                    "on-error": "#ffffff",
                    "surface-tint": "#605e5c",
                    "on-tertiary-fixed": "#1f1b16",
                    "on-secondary": "#ffffff",
                    "surface-container": "#f8ece3",
                    "tertiary-container": "#413c36",
                    "error": "#ba1a1a",
                    "on-surface-variant": "#4a4640",
                    "on-tertiary": "#ffffff",
                    "primary-fixed-dim": "#cac6c3",
                    "primary-fixed": "#e6e1de",
                    "surface-container-lowest": "#ffffff",
                    "tertiary": "#2b2621",
                    "on-tertiary-container": "#aea69e",
                    "on-primary-fixed": "#1d1b1a",
                    "surface-bright": "#fff8f5"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "md": "24px",
                    "xs": "4px",
                    "gutter": "24px",
                    "base": "8px",
                    "xl": "64px",
                    "sm": "12px",
                    "lg": "40px",
                    "margin-mobile": "16px",
                    "margin-desktop": "48px"
            },
            "fontFamily": {
                    "headline-lg-mobile": ["Hanken Grotesk"],
                    "display-lg": ["Hanken Grotesk"],
                    "body-md": ["Inter"],
                    "headline-md": ["Hanken Grotesk"],
                    "body-lg": ["Inter"],
                    "label-sm": ["Inter"],
                    "headline-lg": ["Hanken Grotesk"],
                    "label-md": ["Inter"]
            }
          },
        },
      }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        #map {
            height: 50vh;
            width: 100%;
            z-index: 10;
        }
        @media (min-height: 700px) {
            #map {
                height: 60vh;
            }
        }
        .info-card {
            box-shadow: 0 -4px 20px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body-md flex flex-col min-h-screen">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="js/init-supabase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/header.js"></script>
    <script src="js/footer.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/maps.js"></script>

    <!-- Header Container -->
    <div id="header-container"></div>

    <main class="flex-grow flex flex-col">
        <!-- Status Bar -->
        <div id="status-bar" class="bg-surface-container-high px-md py-sm flex justify-between items-center border-b border-outline-variant">
            <div class="flex items-center gap-sm">
                <span id="mode-badge" class="px-sm py-xs rounded-full text-[10px] font-bold uppercase">Caricamento...</span>
                <span id="active-status" class="hidden flex items-center gap-xs">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                    <span class="text-xs text-secondary font-label-sm">In corso</span>
                </span>
            </div>
            <button id="back-btn" class="flex items-center gap-xs text-primary font-label-md hover:underline">
                <span class="material-symbols-outlined text-[18px]">arrow_back</span>
                <span id="back-label">Indietro</span>
            </button>
        </div>

        <!-- Map Area -->
        <div id="map-container" class="relative flex-grow">
            <div id="map"></div>

            <!-- Empty State Overlay -->
            <div id="empty-state" class="hidden absolute inset-0 z-[20] bg-surface-container-low/90 backdrop-blur-sm flex flex-col items-center justify-center p-xl text-center">
                <span class="material-symbols-outlined text-[64px] text-outline-variant mb-md">map</span>
                <h2 class="font-headline-md text-primary mb-sm">Nessun percorso registrato</h2>
                <p class="text-on-surface-variant max-w-xs" id="empty-message">Questa passeggiata non contiene dati GPS.</p>
            </div>

            <!-- Loading Overlay -->
            <div id="loading-overlay" class="absolute inset-0 z-[30] bg-surface flex items-center justify-center">
                <div class="flex flex-col items-center gap-md">
                    <div class="w-12 h-12 border-4 border-outline-variant border-t-primary rounded-full animate-spin"></div>
                    <p class="font-label-md text-on-surface-variant">Caricamento mappa...</p>
                </div>
            </div>
        </div>

        <!-- Info Card -->
        <div id="info-card" class="bg-surface-container-lowest p-md md:p-lg border-t border-outline-variant info-card z-[25]">
            <div class="max-w-4xl mx-auto space-y-md">
                <div class="flex items-start justify-between">
                    <div class="flex items-center gap-md">
                        <div class="w-12 h-12 rounded-full bg-secondary-container flex items-center justify-center text-on-secondary-container font-bold text-lg shadow-sm" id="user-avatar">
                            --
                        </div>
                        <div>
                            <h3 class="font-headline-md text-primary leading-tight" id="user-name">Caricamento...</h3>
                            <p class="text-xs text-on-surface-variant" id="walk-date">--</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] uppercase text-secondary font-label-sm mb-1">Distanza</p>
                        <p class="font-display-lg text-2xl text-primary" id="distance-val">0.0 km</p>
                    </div>
                </div>

                <div class="grid grid-cols-2 sm:grid-cols-4 gap-md pt-md border-t border-outline-variant/30">
                    <div>
                        <p class="text-[10px] uppercase text-secondary font-label-sm">Inizio</p>
                        <p class="font-body-md text-sm" id="start-time">--:--</p>
                    </div>
                    <div>
                        <p class="text-[10px] uppercase text-secondary font-label-sm">Fine</p>
                        <p class="font-body-md text-sm" id="end-time">--:--</p>
                    </div>
                    <div>
                        <p class="text-[10px] uppercase text-secondary font-label-sm">Durata</p>
                        <p class="font-body-md text-sm" id="duration-val">-- min</p>
                    </div>
                    <div>
                        <p class="text-[10px] uppercase text-secondary font-label-sm" id="accuracy-label">Precisione GPS</p>
                        <p class="font-body-md text-sm" id="accuracy-val">--</p>
                    </div>
                </div>

                <div id="notes-container" class="hidden pt-md border-t border-outline-variant/30">
                    <p class="text-[10px] uppercase text-secondary font-label-sm mb-1">Note</p>
                    <p class="text-sm text-on-surface-variant italic" id="walk-notes"></p>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-container"></div>
</body>
</html>
