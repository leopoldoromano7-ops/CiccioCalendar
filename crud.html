<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Day Detail - ShiftGuardian</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        body { background-color: #fff8f5; font-family: 'Inter', sans-serif; }
        h1, h2, h3, .font-headline { font-family: 'Hanken Grotesk', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f8ece3; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #ccc5bd; border-radius: 10px; }
    </style>
</head>
<body class="text-[#201b15]">
    <header class="w-full top-0 sticky z-50 bg-[#fff8f5] h-20 border-b border-[#ece0d8]">
        <div class="flex justify-between items-center max-w-7xl mx-auto px-8 h-full">
            <div class="flex items-center gap-2">
                <img alt="Logo" class="h-10 w-10" src="favicon.svg"/>
                <span class="text-2xl font-bold text-[#282625]">ShiftGuardian</span>
            </div>
            <div class="flex items-center gap-4">
                <span id="userEmail" class="text-sm text-[#4a4640]"></span>
                <button onclick="handleLogout()" class="text-sm font-medium text-[#ba1a1a] hover:underline">Log Out</button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-8 py-12">
        <div class="flex flex-col md:flex-row md:items-end justify-between gap-6 mb-12">
            <div class="space-y-2">
                <a href="landingpage.html" class="flex items-center gap-1 text-[#6b5c4c] hover:text-[#282625] transition-all group">
                    <span class="material-symbols-outlined text-[18px]">arrow_back</span>
                    <span class="text-sm font-medium">Back to Calendar</span>
                </a>
                <h1 id="currentDateDisplay" class="text-4xl font-bold text-[#201b15]">Loading...</h1>
                <p class="text-[#4a4640]">Manage shifts and coverage for this day.</p>
            </div>
            <div class="flex gap-3">
                <input type="date" id="datePicker" class="rounded-lg border-[#ccc5bd] focus:border-[#282625] focus:ring-0">
                <button onclick="openModal()" class="flex items-center gap-2 bg-[#282625] text-white px-6 py-3 rounded-lg font-bold shadow-sm hover:scale-105 active:scale-95 transition-all">
                    <span class="material-symbols-outlined">add</span>
                    <span>Add New Shift</span>
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
            <div class="lg:col-span-8 bg-white rounded-2xl p-6 border border-[#ece0d8] shadow-sm">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-2xl font-bold text-[#201b15]">Timeline</h2>
                    <div class="flex gap-2">
                        <span class="flex items-center gap-1 px-3 py-1 bg-[#f4dfcb] text-[#716252] rounded-full text-xs font-bold">
                            <span class="w-2 h-2 rounded-full bg-[#6b5c4c]"></span> Morning
                        </span>
                        <span class="flex items-center gap-1 px-3 py-1 bg-[#413c36] text-[#aea69e] rounded-full text-xs font-bold">
                            <span class="w-2 h-2 rounded-full bg-[#2b2621]"></span> Night
                        </span>
                    </div>
                </div>

                <div class="h-[600px] overflow-y-auto custom-scrollbar pr-2 relative" id="timelineContainer">
                    <!-- 24h Grid Labels and Lines -->
                    <div class="grid grid-cols-[60px_1fr] relative">
                        <script>
                            for(let i=0; i<24; i++) {
                                const time = i < 10 ? `0${i}:00` : `${i}:00`;
                                document.write(`
                                    <div class="h-16 flex items-start justify-center text-[#4a4640] text-xs font-medium border-r border-[#f8ece3]">${time}</div>
                                    <div class="h-16 border-b border-[#f8ece3] relative" id="slot-${i}"></div>
                                `);
                            }
                        </script>
                        <!-- Shifts will be absolutely positioned here -->
                        <div id="shiftsOverlay" class="absolute left-[60px] right-0 top-0 bottom-0 pointer-events-none"></div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-4 space-y-6">
                <div class="bg-[#fef1e9] rounded-2xl p-6 border border-[#ece0d8]">
                    <h3 class="text-xl font-bold mb-4 text-[#201b15]">Daily Summary</h3>
                    <div class="space-y-3">
                        <div class="flex justify-between items-center p-3 bg-white rounded-xl">
                            <span class="text-[#4a4640]">Total Shifts</span>
                            <span id="totalShifts" class="font-bold text-[#282625]">0</span>
                        </div>
                        <div class="flex justify-between items-center p-3 bg-white rounded-xl">
                            <span class="text-[#4a4640]">Coverage</span>
                            <span id="totalCoverage" class="font-bold text-[#282625]">0h</span>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-2xl p-6 border border-[#ece0d8] shadow-sm">
                    <h3 class="text-xl font-bold mb-4 text-[#201b15]">On-Duty Team</h3>
                    <div id="staffList" class="space-y-4">
                        <!-- Staff items go here -->
                        <p class="text-sm text-[#4a4640]">No shifts assigned yet.</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Shift Modal -->
    <div id="shiftModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-[#282625]/20 backdrop-blur-sm" onclick="closeModal()"></div>
        <div class="relative bg-white w-full max-w-lg rounded-2xl shadow-2xl p-8 border border-[#ece0d8] transform transition-all">
            <div class="flex justify-between items-center mb-6">
                <h2 id="modalTitle" class="text-2xl font-bold text-[#201b15]">Add New Shift</h2>
                <button onclick="closeModal()" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-[#f8ece3]">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <form id="shiftForm" class="space-y-4">
                <input type="hidden" id="shiftId">
                <div>
                    <label class="block text-sm font-bold text-[#4a4640] mb-1">Shift Title</label>
                    <input type="text" id="shiftTitle" required class="w-full p-3 rounded-xl border border-[#ccc5bd] focus:border-[#282625] outline-none">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-[#4a4640] mb-1">Start Time</label>
                        <input type="time" id="startTime" required class="w-full p-3 rounded-xl border border-[#ccc5bd] focus:border-[#282625] outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-[#4a4640] mb-1">End Time</label>
                        <input type="time" id="endTime" required class="w-full p-3 rounded-xl border border-[#ccc5bd] focus:border-[#282625] outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-bold text-[#4a4640] mb-1">Shift Type</label>
                    <select id="shiftType" class="w-full p-3 rounded-xl border border-[#ccc5bd] focus:border-[#282625] outline-none">
                        <option value="morning">Morning</option>
                        <option value="afternoon">Afternoon</option>
                        <option value="night">Night</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-[#4a4640] mb-1">Assigned Staff</label>
                    <input type="text" id="staffName" required class="w-full p-3 rounded-xl border border-[#ccc5bd] focus:border-[#282625] outline-none">
                </div>
                <div class="pt-4 flex flex-col gap-2">
                    <button type="submit" class="w-full bg-[#282625] text-white py-3 rounded-xl font-bold hover:shadow-lg active:scale-95 transition-all">Save Shift</button>
                    <button type="button" id="deleteBtn" onclick="handleDelete()" class="w-full hidden bg-[#ba1a1a] text-white py-3 rounded-xl font-bold hover:shadow-lg active:scale-95 transition-all">Delete Shift</button>
                </div>
            </form>
        </div>
    </div>

    <script src="supabase-config.js"></script>
    <script>
        let currentUserId = null;
        let selectedDate = new URLSearchParams(window.location.search).get('date') || new Date().toISOString().split('T')[0];
        let currentShifts = [];

        // Initialize
        async function init() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) {
                window.location.href = 'login.html';
                return;
            }
            currentUserId = session.user.id;
            document.getElementById('userEmail').textContent = session.user.email;

            document.getElementById('datePicker').value = selectedDate;
            updateDateDisplay();
            loadShifts();
        }

        function updateDateDisplay() {
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('currentDateDisplay').textContent = new Date(selectedDate).toLocaleDateString(undefined, options);
        }

        document.getElementById('datePicker').addEventListener('change', (e) => {
            selectedDate = e.target.value;
            window.history.pushState({}, '', `?date=${selectedDate}`);
            updateDateDisplay();
            loadShifts();
        });

        async function loadShifts() {
            const { data, error } = await _supabase
                .from('shifts')
                .select('*')
                .eq('date', selectedDate)
                .order('start_time', { ascending: true });

            if (error) {
                console.error('Error loading shifts:', error);
                return;
            }

            currentShifts = data;
            renderShifts();
            updateSummary();
        }

        function renderShifts() {
            const overlay = document.getElementById('shiftsOverlay');
            overlay.innerHTML = '';
            const staffList = document.getElementById('staffList');
            staffList.innerHTML = '';

            if (currentShifts.length === 0) {
                staffList.innerHTML = '<p class="text-sm text-[#4a4640]">No shifts assigned yet.</p>';
            }

            currentShifts.forEach(shift => {
                // Position in timeline
                const [h, m] = shift.start_time.split(':').map(Number);
                const [eh, em] = shift.end_time.split(':').map(Number);
                const startPos = h * 64 + (m / 60) * 64;
                let duration = (eh * 60 + em) - (h * 60 + m);
                if (duration < 0) duration += 24 * 60; // Handle overnight shifts (basic)
                const height = (duration / 60) * 64;

                const shiftEl = document.createElement('div');
                shiftEl.className = `absolute left-0 right-0 p-1 pointer-events-auto cursor-pointer group`;
                shiftEl.style.top = `${startPos}px`;
                shiftEl.style.height = `${height}px`;
                shiftEl.style.zIndex = 20;

                const colorClass = shift.type === 'night' ? 'bg-[#413c36] text-[#aea69e] border-[#2b2621]' : 'bg-[#f4dfcb] text-[#716252] border-[#6b5c4c]';

                shiftEl.innerHTML = `
                    <div onclick="editShift('${shift.id}')" class="w-full h-full rounded-lg border-l-4 p-3 shadow-sm hover:scale-[1.01] transition-all ${colorClass}">
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="font-bold text-sm truncate">${shift.title}</p>
                                <p class="text-xs opacity-80">${shift.start_time.slice(0,5)} - ${shift.end_time.slice(0,5)}</p>
                            </div>
                            <span class="material-symbols-outlined text-xs">edit</span>
                        </div>
                    </div>
                `;
                overlay.appendChild(shiftEl);

                // Add to staff list
                const staffItem = document.createElement('div');
                staffItem.className = 'flex items-center gap-3';
                staffItem.innerHTML = `
                    <div class="w-10 h-10 rounded-full flex items-center justify-center font-bold ${colorClass}">
                        ${shift.staff_name.split(' ').map(n => n[0]).join('').toUpperCase()}
                    </div>
                    <div>
                        <p class="font-bold text-sm">${shift.staff_name}</p>
                        <p class="text-xs text-[#4a4640]">${shift.title}</p>
                    </div>
                `;
                staffList.appendChild(staffItem);
            });
        }

        function updateSummary() {
            document.getElementById('totalShifts').textContent = currentShifts.length;
            let totalMinutes = 0;
            currentShifts.forEach(s => {
                const [sh, sm] = s.start_time.split(':').map(Number);
                const [eh, em] = s.end_time.split(':').map(Number);
                let diff = (eh * 60 + em) - (sh * 60 + sm);
                if (diff < 0) diff += 24 * 60;
                totalMinutes += diff;
            });
            document.getElementById('totalCoverage').textContent = `${Math.floor(totalMinutes / 60)}h ${totalMinutes % 60}m`;
        }

        // CRUD Actions
        function openModal() {
            document.getElementById('modalTitle').textContent = 'Add New Shift';
            document.getElementById('shiftForm').reset();
            document.getElementById('shiftId').value = '';
            document.getElementById('deleteBtn').classList.add('hidden');
            document.getElementById('shiftModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('shiftModal').classList.add('hidden');
        }

        function editShift(id) {
            const shift = currentShifts.find(s => s.id === id);
            if (!shift) return;

            document.getElementById('modalTitle').textContent = 'Edit Shift';
            document.getElementById('shiftId').value = shift.id;
            document.getElementById('shiftTitle').value = shift.title;
            document.getElementById('startTime').value = shift.start_time;
            document.getElementById('endTime').value = shift.end_time;
            document.getElementById('shiftType').value = shift.type;
            document.getElementById('staffName').value = shift.staff_name;

            document.getElementById('deleteBtn').classList.remove('hidden');
            document.getElementById('shiftModal').classList.remove('hidden');
        }

        document.getElementById('shiftForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('shiftId').value;
            const shiftData = {
                user_id: currentUserId,
                title: document.getElementById('shiftTitle').value,
                start_time: document.getElementById('startTime').value,
                end_time: document.getElementById('endTime').value,
                type: document.getElementById('shiftType').value,
                staff_name: document.getElementById('staffName').value,
                date: selectedDate
            };

            let error;
            if (id) {
                const { error: err } = await _supabase.from('shifts').update(shiftData).eq('id', id);
                error = err;
            } else {
                const { error: err } = await _supabase.from('shifts').insert([shiftData]);
                error = err;
            }

            if (error) {
                alert('Error saving shift: ' + error.message);
            } else {
                closeModal();
                loadShifts();
            }
        });

        async function handleDelete() {
            const id = document.getElementById('shiftId').value;
            if (!id || !confirm('Are you sure you want to delete this shift?')) return;

            const { error } = await _supabase.from('shifts').delete().eq('id', id);
            if (error) {
                alert('Error deleting shift: ' + error.message);
            } else {
                closeModal();
                loadShifts();
            }
        }

        async function handleLogout() {
            await _supabase.auth.signOut();
            window.location.href = 'landingpage.html';
        }

        init();
    </script>
</body>
</html>
